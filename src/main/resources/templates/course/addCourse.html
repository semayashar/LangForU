<!doctype html>
<html class="no-js" lang="zxx" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Потребители</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico">

    <!-- CSS here -->
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/owl.carousel.min.css">
    <link rel="stylesheet" href="/css/slicknav.css">
    <link rel="stylesheet" href="/css/animate.min.css">
    <link rel="stylesheet" href="/css/custom-images.css">
    <link rel="stylesheet" href="/css/hamburgers.min.css">
    <link rel="stylesheet" href="/css/magnific-popup.css">
    <link rel="stylesheet" href="/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="/css/themify-icons.css">
    <link rel="stylesheet" href="/css/slick.css">
    <link rel="stylesheet" href="/css/nice-select.css">
    <link rel="stylesheet" href="/css/style.css">

</head>
<body>
<!--? Preloader Start -->
<div id="preloader-active">
    <div class="preloader d-flex align-items-center justify-content-center">
        <div class="preloader-inner position-relative">
            <div class="preloader-circle"></div>
            <div class="preloader-img pere-text">
                <img src="/img/logo/loder.png" alt="">
            </div>
        </div>
    </div>
</div>
<!-- Preloader Start -->

<header th:replace="fragments/navigation"></header>

<main>
    <div class="whole-wrap">
        <div class="container box_1170">
    <div class="section-top-border">
        <div class="row">
            <div class="col-lg-8 col-md-8">
                <h3 class="mb-30">Добави курс</h3>
                <form action="/courses/add" method="post" th:object="${course}">

                    <!-- CSRF Token -->
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <!-- Course Name -->
                    <div class="mt-10">
                        <label for="language">Име на курс:</label>
                        <input type="text" id="language" name="language" placeholder="Име на курс" onfocus="this.placeholder=''" onblur="this.placeholder='Име на курс'" required minlength="2" maxlength="50" class="single-input">
                    </div>

                    <!-- Course Level -->
                    <div class="mt-10">
                        <label for="level">Ниво:</label>
                        <select id="level" name="level" required class="single-input">
                            <option value="" disabled selected>Изберете ниво</option>
                            <option value="A1">A1</option>
                            <option value="A2">A2</option>
                            <option value="B1">B1</option>
                            <option value="B2">B2</option>
                            <option value="C1">C1</option>
                            <option value="C2">C2</option>
                            <option value="HSK1">HSK1</option>
                            <option value="HSK2">HSK2</option>
                            <option value="HSK3">HSK3</option>
                            <option value="HSK4">HSK4</option>
                        </select>
                    </div>

                    <!-- Course Price -->
                    <div class="mt-10">
                        <label for="price">Цена:</label>
                        <input type="number" id="price" name="price" step="0.01" min="0" placeholder="Цена" onfocus="this.placeholder=''" onblur="this.placeholder='Цена'" required class="single-input">
                    </div>

                    <!-- Start Date -->
                    <div class="mt-10">
                        <label for="startDate">Начална дата:</label>
                        <input type="date" id="startDate" name="startDate" required class="single-input">
                    </div>

                    <!-- End Date -->
                    <div class="mt-10">
                        <label for="endDate">Крайна дата:</label>
                        <input type="date" id="endDate" name="endDate" required class="single-input">
                    </div>

                    <!-- Main Instructor Name -->
                    <div class="mt-10">
                        <label for="mainInstructorName">Главен инструктор:</label>
                        <input type="text" id="mainInstructorName" name="mainInstructorName" placeholder="Главен инструктор" onfocus="this.placeholder=''" onblur="this.placeholder='Главен инструктор'" class="single-input">
                    </div>

                    <!-- Assistant Instructor Name -->
                    <div class="mt-10">
                        <label for="assistantInstructorName">Помощник инструктор:</label>
                        <input type="text" id="assistantInstructorName" name="assistantInstructorName" placeholder="Помощник инструктор" onfocus="this.placeholder=''" onblur="this.placeholder='Помощник инструктор'" class="single-input">
                    </div>

                    <!-- Technician Name -->
                    <div class="mt-10">
                        <label for="technicianName">Техник:</label>
                        <input type="text" id="technicianName" name="technicianName" placeholder="Техник" onfocus="this.placeholder=''" onblur="this.placeholder='Техник'" class="single-input">
                    </div>

                    <!-- Picture URL -->
                    <div class="mt-10">
                        <label for="pictureUrl">Снимка (линк):</label>
                        <input type="text" id="pictureUrl" name="pictureUrl" placeholder="Снимка (линк)" onfocus="this.placeholder=''" onblur="this.placeholder='Снимка (линк)'" class="single-input">
                    </div>

                    <!-- Course Description -->
                    <div class="mt-10">
                        <label for="description">Описание:</label>
                        <textarea id="description" name="description" placeholder="Описание" onfocus="this.placeholder=''" onblur="this.placeholder='Описание'" class="single-textarea"></textarea>
                    </div>

                    <!-- Course Rating -->
                    <div class="mt-10">
                        <label for="rating">Оценка:</label>
                        <select id="rating" name="rating" class="single-input">
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>


                    <!-- Submit Button -->
                    <div class="mt-10">
                        <button type="submit" class="genric-btn primary">Добави курс</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>


<!-- Footer -->
<div th:replace="fragments/footer"></div>

<!-- Scroll Up -->
<div id="back-top">
    <a title="Go to Top" href="#"> <i class="fas fa-level-up-alt"></i></a>
</div>

<!-- JS here -->
<script th:replace="fragments/script"></script>



</body>
</html>
