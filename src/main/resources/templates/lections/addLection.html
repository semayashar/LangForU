<!doctype html>
<html class="no-js" lang="zxx" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Потребители</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico">

    <!-- CSS here -->
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/owl.carousel.min.css">
    <link rel="stylesheet" href="/css/slicknav.css">
    <link rel="stylesheet" href="/css/animate.min.css">
    <link rel="stylesheet" href="/css/custom-images.css">
    <link rel="stylesheet" href="/css/hamburgers.min.css">
    <link rel="stylesheet" href="/css/magnific-popup.css">
    <link rel="stylesheet" href="/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="/css/themify-icons.css">
    <link rel="stylesheet" href="/css/slick.css">
    <link rel="stylesheet" href="/css/nice-select.css">
    <link rel="stylesheet" href="/css/style.css">

</head>
<body>
<!--? Preloader Start -->
<div id="preloader-active">
    <div class="preloader d-flex align-items-center justify-content-center">
        <div class="preloader-inner position-relative">
            <div class="preloader-circle"></div>
            <div class="preloader-img pere-text">
                <img src="/img/logo/loder.png" alt="">
            </div>
        </div>
    </div>
</div>
<!-- Preloader Start -->

<header th:replace="fragments/navigation"></header>

<main>
    <div class="whole-wrap">
        <div class="container box_1170">
            <div class="section-top-border">
        <div class="row">
            <div class="col-lg-8 col-md-8">
                <h3 class="mb-30">Добавяне на урок</h3>
                <form th:action="@{/lections/add}" th:object="${lection}" method="post">
                    <div class="mt-10">
                        <label for="name">Урок:</label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Урок" onfocus="this.placeholder=''" onblur="this.placeholder='Урок'" required class="single-input">
                    </div>

                    <div class="mt-10">
                        <label for="theme">Тема:</label>
                        <input type="text" id="theme" th:field="*{theme}" placeholder="Тема" onfocus="this.placeholder=''" onblur="this.placeholder='Тема'" required class="single-input">
                    </div>

                    <div class="mt-10">
                        <label for="videoUrl">Видео URL:</label>
                        <input type="url" id="videoUrl" th:field="*{videoUrl}" placeholder="Видео URL" onfocus="this.placeholder=''" onblur="this.placeholder='Видео URL'" class="single-input">
                    </div>

                    <div class="mt-10">
                        <label for="difficultyLevel">Ниво на трудност:</label>
                        <input type="text" id="difficultyLevel" th:field="*{difficultyLevel}" placeholder="Ниво на трудност" onfocus="this.placeholder=''" onblur="this.placeholder='Ниво на трудност'" required class="single-input">
                    </div>

                    <div class="mt-10">
                        <label for="releaseDate">Дата на излъчване:</label>
                        <input type="date" id="releaseDate" th:field="*{releaseDate}" required class="single-input">
                    </div>

                    <div class="mt-10">
                        <label for="instructor">Инструктор:</label>
                        <input type="text" id="instructor" th:field="*{instructor}" placeholder="Инструктор" onfocus="this.placeholder=''" onblur="this.placeholder='Инструктор'" class="single-input">
                    </div>

                    <div class="mt-10">
                        <label for="additionalResources">Допълнителни ресурси:</label>
                        <textarea id="additionalResources" th:field="*{additionalResources}" placeholder="Допълнителни ресурси" onfocus="this.placeholder=''" onblur="this.placeholder='Допълнителни ресурси'" class="single-textarea"></textarea>
                    </div>

                    <div class="mt-10">
                        <label for="summary">Резюме:</label>
                        <textarea id="summary" th:field="*{summary}" placeholder="Резюме" onfocus="this.placeholder=''" onblur="this.placeholder='Резюме'" class="single-textarea"></textarea>
                    </div>

                    <div class="mt-10">
                        <label for="course">Курс:</label>
                        <select id="course" th:field="*{course}" required class="single-input">
                            <option value="" disabled selected>Изберете курс</option>
                            <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.language + ' - ' + course.level}"></option>
                        </select>
                    </div>

                    <div class="mt-10">
                        <h3>Упражнения</h3>
                        <textarea id="exercisesText" name="exercisesText" rows="10" cols="50" placeholder="Упражнения" onfocus="this.placeholder=''" onblur="this.placeholder='Упражнения'" required class="single-textarea"></textarea>
                    </div>

                    <div class="mt-10">
                        <button type="submit" class="genric-btn info">Запази</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
        </div>
    </div>

</main>


<!-- Footer -->
<div th:replace="fragments/footer"></div>

<!-- Scroll Up -->
<div id="back-top">
    <a title="Go to Top" href="#"> <i class="fas fa-level-up-alt"></i></a>
</div>

<!-- JS here -->
<script th:replace="fragments/script"></script>



</body>
</html>
