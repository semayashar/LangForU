<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Lection</title>
</head>
<body>
<h2>Lection Details</h2>

<a href="/lections">Back to List</a>
<a th:href="@{/lections/edit/{id}(id=${lection.id})}">Edit</a>
<a th:href="@{/lections/delete/{id}(id=${lection.id})}">Delete</a>
</body>
</html>

<!doctype html>
<!doctype html>
<html class="no-js" lang="zxx" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Потребители</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico">

    <!-- CSS here -->
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/owl.carousel.min.css">
    <link rel="stylesheet" href="/css/slicknav.css">
    <link rel="stylesheet" href="/css/animate.min.css">
    <link rel="stylesheet" href="/css/custom-images.css">
    <link rel="stylesheet" href="/css/hamburgers.min.css">
    <link rel="stylesheet" href="/css/magnific-popup.css">
    <link rel="stylesheet" href="/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="/css/themify-icons.css">
    <link rel="stylesheet" href="/css/slick.css">
    <link rel="stylesheet" href="/css/nice-select.css">
    <link rel="stylesheet" href="/css/style.css">

</head>
<body>
<!--? Preloader Start -->
<div id="preloader-active">
    <div class="preloader d-flex align-items-center justify-content-center">
        <div class="preloader-inner position-relative">
            <div class="preloader-circle"></div>
            <div class="preloader-img pere-text">
                <img src="/img/logo/loder.png" alt="">
            </div>
        </div>
    </div>
</div>
<!-- Preloader Start -->

<!-- Header -->
<header th:replace="fragments/navigation"></header>

<main>
    <section class="slider-area slider-area2">
        <div class="slider-active">
            <!-- Single Slider -->
            <div class="single-slider slider-height2">
                <div class="container">
                    <div class="row">
                        <div class="col-xl-8 col-lg-11 col-md-12">
                            <div class="hero__caption hero__caption2">
                                <h1 data-animation="bounceIn" data-delay="0.2s"><span th:text="${lection.name}"></span></h1>
                                <!-- breadcrumb Start-->
                                <nav aria-label="breadcrumb">
                                    <ol class="breadcrumb">
                                        <li class="breadcrumb-item"><a th:href="@{/index}">Начало</a></li>
                                        <li class="breadcrumb-item"><a th:href="@{/lections}">Лекции</a></li>
                                    </ol>
                                </nav>
                                <!-- breadcrumb End -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="sample-text-area"  xmlns:th="http://www.w3.org/1999/xhtml">
        <div class="container box_1170">
            <h3 class="text-heading">Информация на потребител</h3>
            <p class="sample-text">
                Урок: <span th:text="${lection.name}"></span><br>
                Тема:  <span th:text="${lection.theme}"></span><br>
                Видео URL: <span th:text="${lection.videoUrl}"></span> <br>
                Инструктор: <span th:text="${lection.instructor}"></span> <br>
                Ниво на трудност: <span th:text="${lection.difficultyLevel}"></span> <br>
                Допълнителни ресурси: <span th:text="${lection.additionalResources}"></span> <br>
                Резюме:  <span th:text="${lection.summary}"></span><br>
                Дата на излъчване: <span th:text="${lection.releaseDate}"></span><br>
            </p>
            <h4>Упражнения</h4>
            <ul>
                <li th:each="exercise : ${lection.exercises}">
                    <p><strong>Въпрос:</strong> <span th:text="${exercise.question}"></span></p>
                    <p th:if="${exercise.possibleAnswers != null}"><strong>Предложени отговори:</strong>
                        <span th:text="${#strings.listJoin(exercise.possibleAnswers, ', ')}"></span></p>
                    <p><strong>Верен отговор:</strong> <span th:text="${exercise.correctAnswer}"></span></p>
                </li>
            </ul>
        </div>
    </section>



</main>

<!-- Footer -->
<div th:replace="fragments/footer"></div>

<!-- Scroll Up -->
<div id="back-top">
    <a title="Go to Top" href="#"> <i class="fas fa-level-up-alt"></i></a>
</div>

<!-- JS here -->
<script th:replace="fragments/script"></script>

</body>
</html>
